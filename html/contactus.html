<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="description" content="HTML and CSS">
  <meta name="keywords" content="HTML">
  <meta name="author" content="SWATCH watch company">
  <title>Contact Us Form</title>


  <style>
    body {
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
    }

    .form-container {
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #fff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    td input, td select, td textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      height: 80px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
    }

    .checkbox-group input {
      margin-right: 10px;
    }

    .submit-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background-color: #000;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background-color: #444;
    }

    .back-button {
      display: block;
      margin-top: 10px;
      text-align: center;
      text-decoration: none;
      color: black;
      font-size: 16px;
    }

    .error {
      color: red;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h1 style="text-align: center; font-size: 32px; margin-bottom: 20px;">Contact Us</h1>
    <form id="contactForm">
      <table>
        <tr>
          <td><label for="reason">Reason *</label></td>
          <td>
            <select id="reason" name="reason" >
              <option value="">Please specify a reason</option>
              <option value="support">Support</option>
              <option value="feedback">Feedback</option>
              <option value="general">General Query</option>
              <option value="technical">Technical Issue</option>
            </select>
            <div id="reasonError" class="error"></div>
          </td>
        </tr>
        <tr>
          <td><label for="description">Description *</label></td>
          <td>
            <textarea id="description" name="description"></textarea>
            <div id="descriptionError" class="error"></div>
          </td>
        </tr>
        <tr>
          <td><label for="firstName">First Name *</label></td>
          <td>
            <input type="text" id="firstName" name="firstName" >
            <div id="firstNameError" class="error"></div>
          </td>
        </tr>
        <tr>
          <td><label for="lastName">Last Name *</label></td>
          <td>
            <input type="text" id="lastName" name="lastName" >
            <div id="lastNameError" class="error"></div>
          </td>
        </tr>
        <tr>
          <td><label for="email">Email *</label></td>
          <td>
            <input type="email" id="email" name="email" >
            <div id="emailError" class="error"></div>
          </td>
        </tr>
        <tr>
          <td><label for="address">Address *</label></td>
          <td>
            <input type="text" id="address" name="address">
            <div id="addressError" class="error"></div>
          </td>
        </tr>
        <tr>
          <td><label for="phone">Phone *</label></td>
          <td>
            <input type="tel" id="phone" name="phone">
            <div id="phoneError" class="error"></div>
          </td>
        </tr>
        <tr>
          <td colspan="2">
            <button type="submit" class="submit-btn">Submit</button>
            <a href="website1.html" class="back-button">Back to Homepage</a>
          </td>
        </tr>
      </table>
    </form>
  </div>
   <script src="../javascript/contactus.js"></script>
</body>
</html>
